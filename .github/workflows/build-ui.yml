name: Build & Push UI Image

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'docker/nginx/**'
      - '.github/workflows/build-ui.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ui

jobs:
  docker:
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Downcase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME@L}" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=$(git log -1 --format='%cd%h' --date=format:'%Y%m%d%H%M%S')" >> "${GITHUB_ENV}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_SPARQL_ENDPOINT=/sparql
            VITE_AUTH_ENABLED=false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
