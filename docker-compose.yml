services:

  # ─── Nginx: reverse proxy + React SPA ────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.services
      args:
        VITE_AUTH_ENABLED: ${VITE_AUTH_ENABLED:-false}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_SPARQL_ENDPOINT: ${VITE_SPARQL_ENDPOINT:-/sparql}
    ports:
      - "8090:80"
    depends_on:
      - svc-gateway
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── API Gateway (HTTP :50000 → gRPC fan-out) ─────────────────────────────────
  svc-gateway:
    build:
      context: ./services
      dockerfile: svc-gateway/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      SVC_VALIDATE_ADDR: svc-validate:50000
      SVC_SHEXMAP_ADDR: svc-shexmap:50000
      SVC_PAIRING_ADDR: svc-pairing:50000
      SVC_COVERAGE_ADDR: svc-coverage:50000
      SVC_SCHEMA_ADDR: svc-schema:50000
      SVC_AUTH_URL: http://svc-auth:50000
      SVC_SPARQL_PROXY_URL: http://svc-sparql-proxy:50000
    depends_on:
      qlever-init:
        condition: service_completed_successfully
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── ShEx Validation (gRPC :50000) ───────────────────────────────────────────
  svc-validate:
    build:
      context: ./services
      dockerfile: svc-validate/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      LOG_LEVEL: info
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── ShExMap CRUD + Versioning (gRPC :50000) ──────────────────────────────────
  svc-shexmap:
    build:
      context: ./services
      dockerfile: svc-shexmap/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      LOG_LEVEL: info
      QLEVER_SPARQL_URL: http://qlever:7001/sparql
      QLEVER_UPDATE_URL: http://qlever:7001/update
      QLEVER_ACCESS_TOKEN: ${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://w3id.org/shexmap/}
      SVC_VALIDATE_URL: svc-validate:50000
      SVC_ACL_URL: svc-acl:50000
    depends_on:
      qlever-init:
        condition: service_completed_successfully
      svc-acl:
        condition: service_started
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── Pairing CRUD + Versioning (gRPC :50000) ──────────────────────────────────
  svc-pairing:
    build:
      context: ./services
      dockerfile: svc-pairing/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      LOG_LEVEL: info
      QLEVER_SPARQL_URL: http://qlever:7001/sparql
      QLEVER_UPDATE_URL: http://qlever:7001/update
      QLEVER_ACCESS_TOKEN: ${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://w3id.org/shexmap/}
      SVC_SHEXMAP_URL: svc-shexmap:50000
    depends_on:
      qlever-init:
        condition: service_completed_successfully
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── Coverage Analytics (gRPC :50000) ────────────────────────────────────────
  svc-coverage:
    build:
      context: ./services
      dockerfile: svc-coverage/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      LOG_LEVEL: info
      QLEVER_SPARQL_URL: http://qlever:7001/sparql
      QLEVER_UPDATE_URL: http://qlever:7001/update
      QLEVER_ACCESS_TOKEN: ${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://w3id.org/shexmap/}
    depends_on:
      qlever-init:
        condition: service_completed_successfully
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── Schema Catalogue (gRPC :50000) ──────────────────────────────────────────
  svc-schema:
    build:
      context: ./services
      dockerfile: svc-schema/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      LOG_LEVEL: info
      QLEVER_SPARQL_URL: http://qlever:7001/sparql
      QLEVER_UPDATE_URL: http://qlever:7001/update
      QLEVER_ACCESS_TOKEN: ${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://w3id.org/shexmap/}
    depends_on:
      qlever-init:
        condition: service_completed_successfully
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── ACL — WAC authorizations (gRPC :50000) ───────────────────────────────────
  svc-acl:
    build:
      context: ./services
      dockerfile: svc-acl/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      LOG_LEVEL: info
      QLEVER_SPARQL_URL: http://qlever:7001/sparql
      QLEVER_UPDATE_URL: http://qlever:7001/update
      QLEVER_ACCESS_TOKEN: ${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://w3id.org/shexmap/}
    depends_on:
      qlever-init:
        condition: service_completed_successfully
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── Authentication + User Management (HTTP :50000) ───────────────────────────
  svc-auth:
    build:
      context: ./services
      dockerfile: svc-auth/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-86400}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-http://localhost:8090}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      SQLITE_PATH: /data/auth.db
      QLEVER_SPARQL_URL: http://qlever:7001/sparql
      QLEVER_UPDATE_URL: http://qlever:7001/update
      QLEVER_ACCESS_TOKEN: ${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://w3id.org/shexmap/}
    volumes:
      - svc-auth-data:/data
    depends_on:
      qlever-init:
        condition: service_completed_successfully
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── SPARQL Proxy (HTTP :50000) ───────────────────────────────────────────────
  svc-sparql-proxy:
    build:
      context: ./services
      dockerfile: svc-sparql-proxy/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "50000"
      LOG_LEVEL: info
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      QLEVER_SPARQL_URL: http://qlever:7001/sparql
      QLEVER_UPDATE_URL: http://qlever:7001/update
      QLEVER_ACCESS_TOKEN: ${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}
    depends_on:
      qlever-init:
        condition: service_completed_successfully
    networks:
      - shexmap-svc-net
    restart: unless-stopped

  # ─── QLever index initialiser (runs once, exits) ──────────────────────────────
  qlever-init:
    image: adfreiburg/qlever:latest
    user: "0"
    entrypoint: ["/bin/sh", "/scripts/init-index.sh"]
    environment:
      RESTORE_FROM: ${RESTORE_FROM:-}
      BASE_NAMESPACE: ${BASE_NAMESPACE:-https://w3id.org/shexmap/}
    volumes:
      - qlever-svc-data:/data
      - ./sparql:/sparql-data:ro
      - ./docker/qlever:/scripts:ro
      - ./sparql/backup:/backups:ro
    working_dir: /data
    networks:
      - shexmap-svc-net

  # ─── QLever SPARQL server ──────────────────────────────────────────────────────
  qlever:
    image: adfreiburg/qlever:latest
    entrypoint: ["sh", "-c",
      "qlever-server -i shexmap -p 7001 -j 4 -a \"${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}\""
    ]
    environment:
      QLEVER_ACCESS_TOKEN: ${QLEVER_ACCESS_TOKEN:-shexmap-dev-token}
    volumes:
      - qlever-svc-data:/data
    working_dir: /data
    depends_on:
      qlever-init:
        condition: service_completed_successfully
    networks:
      - shexmap-svc-net
    restart: unless-stopped

volumes:
  qlever-svc-data:
  svc-auth-data:

networks:
  shexmap-svc-net:
    driver: bridge
