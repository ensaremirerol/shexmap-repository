syntax = "proto3";
package shexmap.pairing;

import "shexmap.proto";

service PairingService {
  rpc ListPairings         (ListPairingsRequest)     returns (ListPairingsResponse);
  rpc GetPairing           (GetPairingRequest)       returns (PairingResponse);
  rpc CreatePairing        (CreatePairingRequest)    returns (PairingResponse);
  rpc UpdatePairing        (UpdatePairingRequest)    returns (PairingResponse);
  rpc DeletePairing        (DeletePairingRequest)    returns (DeletePairingResponse);

  rpc ListPairingVersions  (ListPVRequest)           returns (ListPVResponse);
  rpc GetPairingVersion    (GetPVRequest)            returns (PVResponse);
  rpc SavePairingVersion   (SavePVRequest)           returns (PVResponse);
}

message Pairing {
  string          id               = 1;
  string          title            = 2;
  string          description      = 3;
  shexmap.map.ShexMap source_map   = 4;
  shexmap.map.ShexMap target_map   = 5;
  string          source_focus_iri = 6;
  string          target_focus_iri = 7;
  repeated string tags             = 8;
  string          license          = 9;
  string          version          = 10;
  string          author_id        = 11;
  string          author_name      = 12;
  string          created_at       = 13;
  string          modified_at      = 14;
  int32           stars            = 15;
}

message ListPairingsRequest {
  string q              = 1;
  string tag            = 2;
  string author         = 3;
  string source_map_id  = 4;
  string target_map_id  = 5;
  int32  page           = 6;
  int32  limit          = 7;
  string sort           = 8;
  string order          = 9;
}

message ListPairingsResponse { repeated Pairing items = 1; int32 total = 2; }
message GetPairingRequest    { string id = 1; }
message DeletePairingRequest { string id = 1; }
message PairingResponse      { Pairing pairing = 1; bool found = 2; }
message DeletePairingResponse { bool success = 1; }

message CreatePairingRequest {
  string          title            = 1;
  string          description      = 2;
  string          source_map_id    = 3;
  string          target_map_id    = 4;
  string          source_focus_iri = 5;
  string          target_focus_iri = 6;
  repeated string tags             = 7;
  string          license          = 8;
  string          version          = 9;
}

message UpdatePairingRequest {
  string          id               = 1;
  string          title            = 2;
  string          description      = 3;
  string          source_map_id    = 4;
  string          target_map_id    = 5;
  string          source_focus_iri = 6;
  string          target_focus_iri = 7;
  repeated string tags             = 8;
  string          license          = 9;
  string          version          = 10;
}

message PairingVersion {
  string id                    = 1;
  string pairing_id            = 2;
  int32  version_number        = 3;
  string commit_message        = 4;
  string source_map_id         = 5;
  int32  source_version_number = 6;
  string target_map_id         = 7;
  int32  target_version_number = 8;
  string author_id             = 9;
  string author_name           = 10;
  string created_at            = 11;
}

message ListPVRequest  { string pairing_id = 1; }
message GetPVRequest   { string pairing_id = 1; int32 version_number = 2; }
message ListPVResponse { repeated PairingVersion versions = 1; }
message PVResponse     { PairingVersion version = 1; bool found = 2; }

message SavePVRequest {
  string pairing_id            = 1;
  string commit_message        = 2;
  string source_map_id         = 3;
  int32  source_version_number = 4;
  string target_map_id         = 5;
  int32  target_version_number = 6;
  bool   has_source_version    = 7;
  bool   has_target_version    = 8;
}
