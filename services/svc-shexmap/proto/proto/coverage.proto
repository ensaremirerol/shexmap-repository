syntax = "proto3";
package shexmap.coverage;

service CoverageService {
  rpc GetOverview (CoverageOverviewRequest) returns (CoverageOverviewResponse);
  rpc GetGaps     (GapAnalysisRequest)      returns (GapAnalysisResponse);
}

message CoverageOverviewRequest {}

message CoverageReport {
  string schema_url        = 1;
  string schema_title      = 2;
  int32  total_shapes      = 3;
  int32  mapped_shapes     = 4;
  int32  coverage_percent  = 5;
  string computed_at       = 6;
}

message CoverageOverviewResponse {
  int32                   total_schemas           = 1;
  int32                   total_shex_maps         = 2;
  int32                   total_shapes            = 3;
  int32                   total_mapped_shapes     = 4;
  int32                   overall_coverage_percent = 5;
  repeated CoverageReport by_schema               = 6;
  string                  computed_at             = 7;
}

message GapAnalysisRequest { string schema_url = 1; }

message ShapeGap {
  string schema_url   = 1;
  string shape_url    = 2;
  string shape_label  = 3;
  bool   has_mappings = 4;
  int32  mapping_count = 5;
}

message GapAnalysisResponse { repeated ShapeGap gaps = 1; }
