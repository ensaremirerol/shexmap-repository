syntax = "proto3";
package shexmap.validate;

service ValidateService {
  rpc Validate(ValidateRequest) returns (ValidateResponse);
}

message ValidateRequest {
  string source_shex = 1;
  string source_rdf   = 2;
  string source_node  = 3;
  string target_shex  = 4;
  string target_node  = 5;
}

message BindingEntry {
  string variable = 1;
  string value    = 2;
  string datatype = 3;
}

message BindingNode {
  string shape             = 1;
  string focus             = 2;
  repeated BindingEntry bindings = 3;
  repeated BindingNode  children = 4;
}

message ValidateResponse {
  bool             shex_valid    = 1;
  repeated string  shex_errors   = 2;
  bool             rdf_valid     = 3;
  repeated string  rdf_errors    = 4;
  bool             valid         = 5;
  repeated BindingNode binding_tree = 6;
  map<string, string> bindings   = 7;
  string           target_rdf    = 8;
  repeated string  errors        = 9;
}
